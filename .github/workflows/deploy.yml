name: CI/CD Pipeline - Docker Hub & Render

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: onkar9822/rag_deployment_backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: onkar9822/rag_deployment_frontend:latest

      - name: Trigger Render Backend Deploy
        run: curl -f ${{ secrets.RENDER_BACKEND_HOOK }}

      - name: Trigger Render Frontend Deploy
        run: curl -f ${{ secrets.RENDER_FRONTEND_HOOK }}

