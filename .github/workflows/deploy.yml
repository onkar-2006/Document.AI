name: CI/CD Pipeline - Docker Hub & Render

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: onkar9822/rag_deployment_backend:latest

      # Build Frontend: Passes the Backend URL as a Build Argument
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./rag_frontend
          push: true
          tags: onkar9822/rag_deployment_frontend:latest
          build-args: |
            VITE_API_URL=https://rag-deployment-backend-latest.onrender.com

    
      - name: Trigger Render Backend Deploy
        run: curl -f "${{ secrets.RENDER_BACKEND_HOOK }}"

      - name: Trigger Render Frontend Deploy
        run: curl -f "${{ secrets.RENDER_FRONTEND_HOOK }}"